<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>บอร์ดแนะนำตัว 👋</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600&family=Prompt:wght@500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --pink: #e8619a;
    --pink-dim: rgba(232,97,154,0.15);
    --pink-glow: rgba(232,97,154,0.3);
    --teal: #3ecfaa;
    --teal-dim: rgba(62,207,170,0.12);
    --text: #f0eef8;
    --text2: #9896aa;
    --text3: #5a5868;
    --r: 14px;
    --rs: 8px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 2rem 1.25rem 4rem;
    position: relative;
    z-index: 1;
  }
  .site-header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp .5s ease both;
  }
  .logo {
    font-family: 'Prompt', sans-serif;
    font-size: 26px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--pink), var(--teal));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
  }
  .site-header p { font-size: 14px; color: var(--text3); }
  .page { display: none; animation: fadeUp .35s ease both; }
  .page.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 1.75rem;
  }
  .card-title { font-family: 'Prompt', sans-serif; font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .card-sub { font-size: 14px; color: var(--text2); margin-bottom: 1.5rem; }
  .field { margin-bottom: 1.1rem; }
  .field label { display: block; font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 7px; letter-spacing: .03em; }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--rs);
    padding: 11px 14px;
    font-size: 15px;
    font-family: 'Sarabun', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .field input::placeholder { color: var(--text3); }
  .field input:focus { border-color: var(--pink); box-shadow: 0 0 0 3px var(--pink-dim); }
  .btn-main {
    width: 100%;
    padding: 13px;
    background: var(--pink);
    color: #fff;
    border: none;
    border-radius: var(--rs);
    font-size: 16px;
    font-family: 'Sarabun', sans-serif;
    font-weight: 600;
    cursor: pointer;
    margin-top: .5rem;
    transition: opacity .15s, transform .1s, box-shadow .2s;
    box-shadow: 0 4px 20px var(--pink-glow);
  }
  .btn-main:hover { opacity: .9; }
  .btn-main:active { transform: scale(.98); }
  .btn-main:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-ghost {
    padding: 9px 16px;
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--rs);
    font-size: 14px;
    font-family: 'Sarabun', sans-serif;
    color: var(--text2);
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); }
  .err {
    font-size: 13px; color: #f07070;
    margin-top: 10px; display: none;
    padding: 8px 12px;
    background: rgba(240,112,112,.1);
    border-radius: var(--rs);
    border: 1px solid rgba(240,112,112,.2);
  }
  .err.show { display: block; }
  .board-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .board-title { font-family: 'Prompt', sans-serif; font-size: 20px; font-weight: 500; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 10px; }
  .my-card {
    background: var(--pink-dim);
    border: 1px solid rgba(232,97,154,.25);
    border-radius: var(--r);
    padding: 1rem 1.25rem;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 1.5rem;
  }
  .member-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: .9rem 1.1rem;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 8px;
    transition: border-color .2s;
    animation: fadeUp .3s ease both;
  }
  .member-card:hover { border-color: var(--border2); }
  .avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Prompt', sans-serif;
    font-size: 14px; font-weight: 600;
    flex-shrink: 0; color: #fff;
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member-ig { font-size: 13px; color: var(--pink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .member-time { font-size: 12px; color: var(--text3); white-space: nowrap; margin-top: 2px; }
  .badge-you { font-size: 11px; font-weight: 600; padding: 3px 9px; background: var(--pink); color: #fff; border-radius: 99px; flex-shrink: 0; }
  .count-pill { display: inline-flex; align-items: center; background: var(--teal-dim); color: var(--teal); font-size: 12px; font-weight: 600; padding: 2px 10px; border-radius: 99px; margin-left: 8px; vertical-align: middle; }
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text3); }
  .empty .icon { font-size: 36px; margin-bottom: 10px; }
  .empty p { font-size: 14px; line-height: 1.7; }
  .loading { text-align: center; padding: 2rem; color: var(--text3); font-size: 14px; }
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--pink); border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-row { text-align: center; margin-top: 1rem; }
  .live-dot { display: inline-block; width: 7px; height: 7px; background: var(--teal); border-radius: 50%; margin-right: 6px; animation: pulse 2s ease-in-out infinite; vertical-align: middle; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .live-label { font-size: 12px; color: var(--text3); }
</style>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div class="logo">👋 บอร์ดแนะนำตัว</div>
    <p>กรอกชื่อเล่นและ IG แล้วมาเจอกัน</p>
  </header>

  <div id="page-form" class="page active">
    <div class="card">
      <div class="card-title">มาแนะนำตัวกัน! 🎉</div>
      <div class="card-sub">กรอกข้อมูลด้านล่าง แล้วไปดูว่ามีใครอีกบ้าง</div>
      <div class="field">
        <label>ชื่อเล่น</label>
        <input type="text" id="input-nickname" placeholder="เช่น ปลา, มิ้ว, แบงค์" maxlength="30" />
      </div>
      <div class="field">
        <label>Instagram</label>
        <input type="text" id="input-ig" placeholder="@username" maxlength="40" />
      </div>
      <p class="err" id="form-err"></p>
      <button class="btn-main" id="btn-submit" onclick="handleSubmit()">ยืนยัน ไปดูคนอื่นๆ เลย! →</button>
    </div>
  </div>

  <div id="page-board" class="page">
    <div class="board-topbar">
      <div class="board-title">บอร์ดทั้งหมด <span class="count-pill" id="member-count">0</span></div>
      <button class="btn-ghost" onclick="goBack()">✏️ แก้ไข</button>
    </div>
    <div style="margin-bottom:1rem;">
      <span class="live-dot"></span>
      <span class="live-label">อัปเดต realtime อัตโนมัติ</span>
    </div>
    <div id="my-entry-section" style="display:none;">
      <div class="section-label">ข้อมูลของคุณ</div>
      <div class="my-card">
        <div class="avatar" id="my-avatar">?</div>
        <div class="member-info">
          <div class="member-name" id="my-name-disp">-</div>
          <div class="member-ig" id="my-ig-disp">-</div>
        </div>
        <span class="badge-you">คุณ</span>
      </div>
    </div>
    <div class="section-label">สมาชิกทั้งหมด</div>
    <div id="members-list">
      <div class="loading"><div class="spinner"></div><br>กำลังโหลด...</div>
    </div>
    <div class="refresh-row">
      <button class="btn-ghost" onclick="manualRefresh()" style="font-size:13px;">🔄 รีเฟรช</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, push, onValue, serverTimestamp }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ============================================================
//  วางค่า firebaseConfig ของคุณตรงนี้
//  (คัดลอกมาจาก Firebase Console → Project Settings → Your apps)
// ============================================================
const firebaseConfig = {
  apiKey:            "PASTE_YOUR_apiKey_HERE",
  authDomain:        "PASTE_YOUR_authDomain_HERE",
  databaseURL:       "PASTE_YOUR_databaseURL_HERE",
  projectId:         "PASTE_YOUR_projectId_HERE",
  storageBucket:     "PASTE_YOUR_storageBucket_HERE",
  messagingSenderId: "PASTE_YOUR_messagingSenderId_HERE",
  appId:             "PASTE_YOUR_appId_HERE"
};
// ============================================================

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);
const MEMBERS_REF = ref(db, 'members');

const $ = id => document.getElementById(id);
const COLORS = ['#e8619a','#3ecfaa','#6e8ef5','#f5a623','#9b6ef5','#f5736e'];

function hashColor(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return COLORS[Math.abs(h) % COLORS.length];
}
function getInitials(s) { return s.slice(0,2).toUpperCase(); }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function timeAgo(ts) {
  const d = Math.floor((Date.now() - ts) / 1000);
  if (d < 60) return 'เมื่อกี้นี้';
  if (d < 3600) return Math.floor(d/60) + ' นาทีที่แล้ว';
  if (d < 86400) return Math.floor(d/3600) + ' ชั่วโมงที่แล้ว';
  return Math.floor(d/86400) + ' วันที่แล้ว';
}
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const el = $(id); el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
}

let myEntry = null;

window.handleSubmit = async function() {
  const nickname = $('input-nickname').value.trim();
  const igRaw    = $('input-ig').value.trim();
  const err      = $('form-err');
  if (!nickname || !igRaw) { err.textContent = 'กรุณากรอกให้ครบทั้งสองช่องก่อนนะ'; err.classList.add('show'); return; }
  err.classList.remove('show');
  const ig = igRaw.startsWith('@') ? igRaw : '@' + igRaw;
  $('btn-submit').disabled = true;
  $('btn-submit').textContent = 'กำลังบันทึก...';
  try {
    const entry = await push(MEMBERS_REF, { nickname, ig, tsClient: Date.now(), ts: serverTimestamp() });
    myEntry = { key: entry.key, nickname, ig };
    showBoardPage();
  } catch(e) {
    err.textContent = 'เกิดข้อผิดพลาด: ' + e.message;
    err.classList.add('show');
    $('btn-submit').disabled = false;
    $('btn-submit').textContent = 'ยืนยัน ไปดูคนอื่นๆ เลย! →';
  }
};

function showBoardPage() {
  if (myEntry) {
    $('my-entry-section').style.display = 'block';
    $('my-name-disp').textContent = myEntry.nickname;
    $('my-ig-disp').textContent   = myEntry.ig;
    const av = $('my-avatar');
    av.textContent = getInitials(myEntry.nickname);
    av.style.background = hashColor(myEntry.nickname);
  }
  showPage('page-board');
  startListening();
}

function startListening() {
  onValue(MEMBERS_REF, snap => {
    const data = snap.val() || {};
    const members = Object.entries(data)
      .map(([key,v]) => ({key,...v}))
      .sort((a,b) => (b.tsClient||0) - (a.tsClient||0));
    $('member-count').textContent = members.length;
    const others = members.filter(m => !myEntry || m.key !== myEntry.key);
    if (!others.length) {
      $('members-list').innerHTML = '<div class="empty"><div class="icon">🌟</div><p>คุณเป็นคนแรกที่กรอก!<br>ส่งลิงก์ให้เพื่อนๆ มากรอกด้วยนะ</p></div>';
      return;
    }
    $('members-list').innerHTML = others.map((m,i) => `
      <div class="member-card" style="animation-delay:${i*.04}s">
        <div class="avatar" style="background:${hashColor(m.nickname)}">${getInitials(m.nickname)}</div>
        <div class="member-info">
          <div class="member-name">${escHtml(m.nickname)}</div>
          <div class="member-ig">${escHtml(m.ig)}</div>
        </div>
        <div class="member-time">${timeAgo(m.tsClient||Date.now())}</div>
      </div>`).join('');
  });
}

window.goBack = function() {
  if (myEntry) { $('input-nickname').value = myEntry.nickname; $('input-ig').value = myEntry.ig; }
  $('btn-submit').disabled = false;
  $('btn-submit').textContent = 'ยืนยัน ไปดูคนอื่นๆ เลย! →';
  showPage('page-form');
};

window.manualRefresh = function() {
  $('members-list').innerHTML = '<div class="loading"><div class="spinner"></div><br>กำลังโหลด...</div>';
  startListening();
};
</script>
</body>
</html>
